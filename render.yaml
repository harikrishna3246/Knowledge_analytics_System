services:
  - type: web
    name: knowledge-analytics-backend
    runtime: python
    runtimeVersion: 3.11.8
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r backend/requirements.txt && python backend/download_nltk_data.py
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
